## Configuration file for a typical i2pd user
## See https://i2pd.readthedocs.io/en/latest/user-guide/configuration/
## for more options you can use in this file.

## Lines that begin with "## " try to explain what's going on. Lines
## that begin with just "#" are disabled commands: you can enable them
## by removing the "#" symbol.

#####################################################################
#                   GENERAL CONFIGURATION OPTIONS                   #
#####################################################################

## Path to the tunnels configuration file. [string]
## This file contains the configuration for all tunnels (both client and server) that the router will run.
# tunconf = ~/.i2pd/tunnels.conf

## Path to the directory containing tunnel configuration files. [string]
## This directory is scanned for files with the ".conf" extension, and each file is loaded as a tunnel configuration.
# tunnelsdir = ~/.i2pd/tunnels.d

## Path to the directory containing router certificates. [string]
## This directory is scanned for files with the ".crt" extension, and each file is loaded as a router certificate.
# certsdir = ~/.i2pd/certificates

## Path to the Process ID file. [string]
## This file contains the process ID of the running i2pd instance. It is used to manage the process (e.g., stopping or restarting it).
# pidfile = /run/i2pd.pid

## Run i2pd as a daemon (background process) [true/false]
## True  <-- The router will run in the background as a daemon.
## False <-- The router will run in the foreground and will not return to the shell prompt.
daemon = true

#####################################################################
#                   LOGGING CONFIGURATION OPTIONS                   #
#####################################################################

## Logs destination [stdout, file, syslog]
## stdout - print log entries to stdout
## file   - log entries to a file
## syslog - use syslog, see man 3 syslog
# log = stdout

## Path to logfile [string]
# logfile = /var/log/i2pd/i2pd.log

## Log messages above this level [debug, info, warn, error, critical, none]
# loglevel = error

## Write full CLF-formatted date and time to log [true/false]
# logclftime = true

#####################################################################
#                   NETWORK CONFIGURATION OPTIONS                   #
#####################################################################

## Router external IP advertised for incoming connections. [string]
## This is the external IP address of the router, which is used for incoming connections from other routers and clients.
## It is important to set this value correctly, especially if the router is behind a NAT or firewall, to ensure that it can be reached by other nodes in the network.
## If the router is running on a machine with a dynamic IP address, it may be necessary to update this value periodically to reflect the current external IP address.
## The default value is typically set to 'auto' if SSU2 is enabled and UPnP is enabled and working correctly.
# host = auto

## Port for incoming connections. [integer]
## This is the port number on which the router will listen for incoming connections from other routers and clients.
## It is important to choose a port that is not already in use by another service on the system, and to ensure that any necessary firewall rules are configured to 
## allow traffic on this port.
## The default value is typically set to 4567, but it can be customized to suit the user's preferences or system configuration.
## Note that if the router is running behind a NAT or firewall, it may be necessary to configure port forwarding to allow incoming connections on this port.
port = 4567

## Network interface to bind to. [string]
## This is the network interface that the router will bind to for incoming connections.
## It is important to set this value correctly, especially if the machine has multiple network interfaces, to ensure that the router can receive incoming connections 
## on the correct interface.
## The default value is typically set to 'auto', which means that the router will bind to all available network interfaces.
## However, if the machine has multiple interfaces and the user wants to bind to a specific one, they can set this value to the name of the desired interface
## (e.g., eth0, wlan0, etc.).
# ifname = eth0

## This setting allows the user to specify the network interface for IPv4 traffic. [string]
## This can be useful in cases where the machine has different interfaces for IPv4 and IPv6 traffic, or if the user wants to bind to specific interfaces for each protocol.
## The default value is typically set to 'auto', which means that the router will bind to all available network interfaces for IPv4 traffic.
# ifname4 = eth0

## This setting allows the user to specify the network interface for IPv6 traffic. [string]
## This can be useful in cases where the machine has different interfaces for IPv4 and IPv6 traffic, or if the user wants to bind to specific interfaces for each protocol.
## The default value is typically set to 'auto', which means that the router will bind to all available network interfaces for IPv6 traffic.
# ifname6 = eth0

## This setting allows the user to specify the IPv4 address for the router. [string]
## This is the IPv4 address that the router will use for incoming connections and outgoing traffic.
## It is important to set this value correctly, especially if the machine has multiple network interfaces or if the router is running behind a NAT or firewall, to ensure 
## that it can communicate properly with other nodes in the network.
## The default value is typically set to 'auto', which means that the router will automatically determine the appropriate IPv4 address to use based on the network 
## configuration of the machine.
# address4 = auto

## This setting allows the user to specify the IPv6 address for the router. [string]
## This is the IPv6 address that the router will use for incoming connections and outgoing traffic.
## It is important to set this value correctly, especially if the machine has multiple network interfaces or if the router is running behind a NAT or firewall, to ensure
## that it can communicate properly with other nodes in the network.
## The default value is typically set to 'auto', which means that the router will automatically determine the appropriate IPv6 address to use based on the network
## configuration of the machine.
# address6 = auto

## This setting allows the user to specify whether to reserve the default range of IP addresses for internal use. [true/false]
## Setting this to 'enabled' will reserve the default range of IP addresses for internal use, preventing them from being used for external connections.
## The default value is typically set to 'enabled'.
# reservedrange = enabled

## Whether the router is behind a NAT (Network Address Translation) device. [true/false]
## Setting this to 'true' indicates that the router is behind a NAT device, which may require additional configuration to allow incoming connections from other nodes 
## in the network.
## The default value is typically set to 'false', but it can be changed to 'true' if the router is running behind a NAT device, such as a home router or firewall.
nat = true

## Whether the router should use IPv4 for incoming and outgoing connections. [true/false]
## Setting this to 'true' enables IPv4 support, allowing the router to communicate with other nodes in the network that use IPv4 addresses.
## The default value is typically set to 'true', but it can be changed to 'false' if the user wants to disable IPv4 support for the router.
ipv4 = true

## Whether the router should use IPv6 for incoming and outgoing connections. [true/false]
## Setting this to 'true' enables IPv6 support, allowing the router to communicate with other nodes in the network that use IPv6 addresses.
## The default value is typically set to 'false', but it can be changed to 'true' if the user wants to enable IPv6 support for the router.
ipv6 = false

## Enable or Disable transit traffic. [true/false]
## True   <-- The router will not accept transit tunnels from other routers.
##            This is useful for routers with limited bandwidth or resources.
## False  <-- The router will accept transit tunnels from other routers.
##            This is useful for routers with more bandwidth and resources.
notransit = false

## Whether the router should be a floodfill router. [true/false]
## Setting this to 'true' enables floodfill functionality, allowing the router to participate in the network's floodfill operations, which can help improve the
# overall performance and connectivity of the network.
## Setting this to 'false' disables floodfill functionality, which can be useful for routers with limited bandwidth or resources, as floodfill operations can be
## resource-intensive.
floodfill = false

## Bandwidth limit for the router. [integer/character]
## This setting allows the user to specify the maximum bandwidth that the router will use for incoming and outgoing connections. The value is specified in kilobytes
## per second (KB/s).
## Examples: 
##  ---------------------------------------------------------------------------------------------------------
##  Integers:   512 means 512 Kb/s  | 15000 means 15 Mb/s | 10mb means 10 Mb/s  | 0 means unlimited bandwidth
##  Letters:    L = 32 Kb/s         | O = 256 Kb/s        | P = 2 Mb/s          | X = Unlimited
##  ---------------------------------------------------------------------------------------------------------
## Setting this to a lower value can help reduce the load on the router and conserve bandwidth, while setting it to a higher value can improve performance and connectivity
## with other nodes in the network.
## The default value is typically set to 512 KB/s, but it can be customized to suit the user's preferences or system configuration. It is important to ensure that the
## specified bandwidth limit does not exceed the available bandwidth of the network connection, as this can lead to performance issues and connectivity problems.
bandwidth = 50mb

## Percentage of bandwidth to share with other routers (transit). [integer]
## This setting allows the user to specify the percentage of the router's total bandwidth that will be shared with other routers in the network. The value is specified 
## as an integer between 0 and 100, representing the percentage of bandwidth to be shared.
## Setting this to a higher value can help improve the overall performance and connectivity of the network, while setting it to a lower value can help conserve bandwidth
## for the router's own use.
## The default value is typically set to 75%, but it can be customized to suit the user's preferences or system configuration. It is important to ensure that the specified
## percentage does not exceed the available bandwidth of the network connection, as this can lead to performance issues and connectivity problems.
share = 50

## This setting allows the user to specify the family name for the router. [string]
## A family is a group of routers that share a common name and are treated as a single entity by the network.
## This can be useful for organizational purposes, allowing users to group their routers together under a common name, and for network management, as the network can make 
## routing decisions based on family membership.
## The family name can be any string, and it is typically set to a name that reflects the purpose or identity of the router (e.g., "MyRouterFamily").
## The default value is typically set to an empty string, which means that the router does not belong to any family.
## If the user wants to assign the router to a family, they can set this value to the desired family name.
## It is important to note that the family name should be unique and not shared with other routers that are not intended to be part of the same family, as this can lead to
## confusion and unintended consequences in the network.
# family = 

## This setting allows the user to specify the network ID for the router. [integer]
## The network ID is used to identify the network that the router belongs to, and it is important for ensuring that the router can communicate properly with other nodes in
## the network.
## The default value is typically set to 2, which is the standard network ID for the I2P network.
# netid = 2

## Enables or disables the use of STAN (Simple Transport for Anonymous Networks). [true/false]
## For places with limited connectivity, such as behind a restrictive firewall or in a network with limited access to the public internet, setting this to 'true' can help
## improve connectivity by allowing the router to use alternative methods for establishing connections with other nodes in the network.
# stan = false

#####################################################################
#                Network Transport Core Protocol 2 (TCP)            #
#####################################################################

[ntcp2]
## Whether to enable NTCP2 (Network Transport Core Protocol version 2) support. [true/false]
## Setting this to 'true' enables NTCP2 support, allowing the router to use the NTCP2 protocol for incoming and outgoing connections, which can provide improved performance
## and security compared to the older NTCP protocol.
enabled = true

## Whether to publish the router's NTCP2 port in the network database. [true/false]
## Setting this to 'true' allows other nodes in the network to discover and connect to the router using the NTCP2 protocol, which can improve connectivity and performance.
## Setting this to 'false' will prevent the router from advertising its NTCP2 port, which may limit connectivity with other nodes that rely on NTCP2 for communication.
published = true

## Port number for NTCP2 connections. [integer]
## This is the port number on which the router will listen for incoming NTCP2 connections from other routers and clients. It is important to choose a port that is not
## already in use by another service on the system, and to ensure that any necessary firewall rules are configured to allow traffic on this port.
## The default value is typically set to 4567, but it can be customized to suit the user's preferences or system configuration.
## Note that if the router is running behind a NAT or firewall, it may be necessary to configure port forwarding to allow incoming connections on this port.
port = 4567

## This setting allows the user to specify the IPv6 address for NTCP2 connections. [string]
## This is the IPv6 address that the router will advertise for NTCP2 connections.
## It is important to set this value correctly, especially if the machine has multiple network interfaces or if the router is running behind a NAT or firewall, to ensure
## that it can communicate properly with other nodes in the network using the NTCP2 protocol.
## The default value is typically set to 'auto', which means that the router will automatically determine the appropriate IPv6 address to use for NTCP2 connections based
## on the network configuration of the machine.
# addressv6 = 2001:db8:1::10

## This setting allows the user to specify the version of the NTCP2 protocol to use. [integer]
## The NTCP2 protocol has multiple versions, and this setting allows the user to specify which version to use for incoming and outgoing connections.
## The default value is typically set to 2, which is the latest version of the NTCP2 protocol and provides improved performance and security compared to earlier versions.
## It is recommended to use the latest version of the protocol whenever possible, as it may include important security updates and performance improvements.
## -----------------------------------------------------------------
## Values |   Description
## 2      |   Standard Cryptography
## 3      |   ML-KEM-512
## 4      |   ML-KEM-768
## 5      |   ML-KEM-1024
## -----------------------------------------------------------------
# version = 4

#####################################################################
#                Secure Semi-Reliable UDP version 2 (UDP)           #
#####################################################################

[ssu2]
## Whether to enable SSU2 (Secure Semi-Reliable UDP version 2) support. [true/false]
## Setting this to 'true' enables SSU2 support, allowing the router to use the SSU2 protocol for incoming and outgoing connections, which can provide improved performance
## and security.
enabled = true

## Whether to publish the router's SSU2 port in the network database. [true/false]
## Setting this to 'true' allows other nodes in the network to discover and connect to the router using the SSU2 protocol, which can improve connectivity and performance.
## Setting this to 'false' will prevent the router from advertising its SSU2 port, which may limit connectivity with other nodes that rely on SSU2 for communication.
published = true

## Port number for SSU2 connections. [integer]
## This is the port number on which the router will listen for incoming SSU2 connections from other routers and clients. It is important to choose a port that is not already
## in use by another service on the system, and to ensure that any necessary firewall rules are configured to allow traffic on this port.
## The default value is typically set to 4567, but it can be customized to suit the user's preferences or system configuration.
## Note that if the router is running behind a NAT or firewall, it may be necessary to configure port forwarding to allow incoming connections on this port.
port = 4567

## SOCKS5 proxy for SSU2 connections. [string]
## This setting allows the user to specify a SOCKS5 proxy for SSU2 connections, which can be useful for routing traffic through a specific proxy server or for bypassing
## network restrictions.
## The value should be specified in the format "socks://address:port", where "address" is the IP address or hostname of the proxy server, and "port" is the port number on
## which the proxy server is listening for connections.
## If no proxy is desired, this setting can be left blank or commented out.
# proxy = socks://address:port

## This setting allows the user to specify the maximum transmission unit (MTU) size for SSU2 connections over IPv4. [integer]
## The MTU size determines the maximum size of packets that can be sent over the network, and it can affect the performance and reliability of the connection.
## The default value is typically set to 'auto', which means that the router will automatically determine the appropriate MTU size based on the network configuration and
## conditions.
## However, if the user wants to specify a specific MTU size, they can set this value to the desired integer value (in bytes).
## It is important to ensure that the specified MTU size does not exceed the maximum supported by the network and the devices involved in the connection.
# mtu4 = auto

## This setting allows the user to specify the maximum transmission unit (MTU) size for SSU2 connections over IPv6. [integer]
## The MTU size determines the maximum size of packets that can be sent over the network, and it can affect the performance and reliability of the connection.
## The default value is typically set to 'auto', which means that the router will automatically determine the appropriate MTU size based on the network configuration and
## conditions.
## However, if the user wants to specify a specific MTU size, they can set this value to the desired integer value (in bytes).
## It is important to ensure that the specified MTU size does not exceed the maximum supported by the network and the devices involved in the connection.
#mtu6 = auto

## Set the network status to Firewalled even if OK on IPv4. [true/false]
#firewalled4 = false

## Set the network status to Firewalled even if OK on IPv6. [true/false]
#firewalled6 = false

## This setting allows the user to specify the version of the SSU2 protocol to use. [integer]
## The SSU2 protocol has multiple versions, and this setting allows the user to specify which version to use for incoming and outgoing connections.
## The default value is typically set to 2, which is the latest version of the SSU2 protocol and provides improved performance and security compared to earlier versions.
## It is recommended to use the latest version of the protocol whenever possible, as it may include important security updates and performance improvements.
## -----------------------------------------------------------------
## Values |   Description
## 2      |   Standard Cryptography
## 3      |   ML-KEM-512
## 4      |   ML-KEM-768
## -----------------------------------------------------------------
# version = 2

#####################################################################
#                             Web Console                           #
#####################################################################

[http]
## Whether to enable the web console for managing the router. [true/false]
enabled = true

## IP address for the web console. [string]
## This is the IP address that the web console will bind to for incoming connections.
## It is important to choose an IP address that is accessible from the user's network and that does not conflict with other services running on the system.
## -----------------------------------------------------------------
## Values       |   Description
## 127.0.0.1    |   Listen on localhost only (default)
## 0.0.0.0      |   Listen on all available interfaces
## 192.168.1.5  |   Listen on a specific interface (replace with your desired IP address)
## 10.0.0.5     |   Listen on a specific interface (replace with your desired IP address)
## -----------------------------------------------------------------
address = 10.0.0.81

## Port number for the web console. [integer]
port = 7070

## Whether to require authentication for the web console. [true/false]
## Setting this to 'true' requires users to provide a username and password to access the web console, which can help improve security by preventing unauthorized access.
auth = false

## Username for the web console. [string]
## This is the username that users will need to provide when accessing the web console if authentication is enabled.
## It is important to choose a strong and unique username to help improve security.
# user = i2pd

## Password for the web console. [string]
## This is the password that users will need to provide when accessing the web console if authentication is enabled.
## It is important to choose a strong and unique password to help improve security.
# pass = SomePassword

## Whether to enforce strict HTTP headers for the web console. [true/false]
## Setting this to 'true' enforces strict HTTP headers, which can help improve security by preventing certain types of attacks and vulnerabilities.
# strictheaders = true

## Expected hostname for the WebUI (defaults to localhost). [string]
## This setting allows the user to specify the expected hostname for the web console, which can help improve security by ensuring that the web console is accessed using
## the correct hostname.
## It is important to set this value correctly, especially if the web console is accessed using a custom domain name or hostname.
## This should match either the hostname of the machine or the IP address that the web console is bound to.
## If the web console is accessed using a different hostname or IP address, it will result in the error: hostname mismatch and the WebUI will not load.
hostname = i2pd

## Whether to show the total TCS (Total Connection Speed) rate in the web console. [true/false]
## Setting this to 'true' displays the total connection speed in the web console, which can provide useful information about the router's performance and connectivity.
showTotalTCSR = true

## Web root directory for the web console. [string]
## This setting allows the user to specify the root directory for the web console, which can help improve security by limiting access to specific files and directories.
# webroot = /

## Language for the web console. [string]
## This setting allows the user to specify the language for the web console, which can help improve accessibility and usability for users who prefer a specific language.
## The default value is typically set to 'en' (English), but it can be customized to suit the user's preferences or system configuration.
lang = en

## Theme for the web console. [string]
## This setting allows the user to specify the theme for the web console, which can help improve the visual appearance and usability of the interface.
## The default value is typically set to 'light', but it can be customized to suit the user's preferences or system configuration.
theme = light

#####################################################################
#                             HTTP Proxy                            #
#####################################################################

[httpproxy]
## Whether the HTTP proxy is enabled. [true/false]
## Setting this to 'true' enables the HTTP proxy, allowing the router to accept incoming HTTP connections and forward them to other nodes in the network.
enabled = true

## IP address for the HTTP proxy. [string]
## This is the IP address that the HTTP proxy will bind to for incoming connections.
## It is important to choose an IP address that is accessible from the user's network and that does not conflict with other services running on the system.
address = 10.0.0.81

## Port number for the HTTP proxy. [integer]
## This is the port number on which the HTTP proxy will listen for incoming connections.
## It is important to choose a port that is not already in use by another service on the system, and to ensure that any necessary firewall rules are configured to allow
## traffic on this port.
## The default value is typically set to 4444, but it can be customized to suit the user's preferences or system configuration.
port = 4444

## Optional keys file for the HTTP proxy. [string]
## This setting allows the user to specify a keys file for the HTTP proxy, which can be used to provide additional security and authentication for incoming connections.
## The keys file should contain the necessary keys and credentials for the HTTP proxy, and it should be stored in a secure location to prevent unauthorized access.
# keys = 

## Optional signature type for the HTTP proxy. [integer]
## This setting allows the user to specify the signature type for the HTTP proxy, which can be used to provide additional security and authentication for incoming connections.
## The signature type should be set to a valid integer value that corresponds to the desired signature algorithm, and it should be chosen based on the user's security
## requirements and preferences.
# signaturetype = 7

## Inbound tunnel length if keys is set. [integer]
## This setting allows the user to specify the length of inbound tunnels for the HTTP proxy when a keys file is provided. The length determines the number of hops that
## incoming connections will take through the network before reaching the router.
## A longer tunnel length can provide increased anonymity and security, but it may also result in increased latency and reduced performance.
## Conversely, a shorter tunnel length can improve performance but may reduce anonymity and security.
## The default value is typically set to 2, but it can be customized to suit the user's preferences or system configuration.
## It is important to choose a tunnel length that balances the desired level of anonymity and security with the performance requirements of the router.
# inbound.length = 3

## Inbound tunnel quantity if keys is set. [integer]
## This setting allows the user to specify the quantity of inbound tunnels for the HTTP proxy when a keys file is provided. The quantity determines the number of separate
## inbound tunnels that will be established for incoming connections.
## A higher quantity of inbound tunnels can provide increased redundancy and reliability, as multiple tunnels can be used to handle incoming connections. However, it may
## also result in increased resource usage and reduced performance.
# inbound.quantity = 5

## Inbound tunnel length variance if keys is set. [integer]
## This setting allows the user to specify the variance in length for inbound tunnels for the HTTP proxy when a keys file is provided. The variance determines the range
## of possible lengths for inbound tunnels, allowing for some variability in the tunnel lengths.
## A higher variance can provide increased anonymity and security, as it makes it more difficult for an observer to determine the exact length of the tunnels. However, it
## may also result in increased latency and reduced performance.
# inbound.lengthVariance = 0

## Outbound tunnel length if keys is set. [integer]
## This setting allows the user to specify the length of outbound tunnels for the HTTP proxy when a keys file is provided.
## The length determines the number of hops that outgoing connections will take through the network before reaching their destination.
## A longer tunnel length can provide increased anonymity and security, but it may also result in increased latency and reduced performance.
## Conversely, a shorter tunnel length can improve performance but may reduce anonymity and security.
## The default value is typically set to 3, but it can be customized to suit the user's preferences or system configuration.
## It is important to choose a tunnel length that balances the desired level of anonymity and security with the performance requirements of the router.
# outbound.length = 3

## Outbound tunnel quantity if keys is set. [integer]
## This setting allows the user to specify the quantity of outbound tunnels for the HTTP proxy when a keys file is provided. The quantity determines the number of separate
## outbound tunnels that will be established for outgoing connections.
## A higher quantity of outbound tunnels can provide increased redundancy and reliability, as multiple tunnels can be used to handle outgoing connections. However, it may
## also result in increased resource usage and reduced performance.
# outbound.quantity = 5

## Outbound tunnel length variance if keys is set. [integer]
## This setting allows the user to specify the variance in length for outbound tunnels for the HTTP proxy when a keys file is provided.
## The variance determines the range ofpossible lengths for outbound tunnels, allowing for some variability in the tunnel lengths.
## A higher variance can provide increased anonymity and security, as it makes it more difficult for an observer to determine the exact length of the tunnels.
## However, it may also result in increased latency and reduced performance.
# outbound.lengthVariance = 0

## Optional outproxy for the HTTP proxy. [string]
## This setting allows the user to specify an outproxy for the HTTP proxy, which can be used to route outgoing connections through a specific proxy server or to bypass
## network restrictions.
## The value should be specified in the format "http://address:port", where "address" is the IP address or hostname of the proxy server, and "port" is the port number on
## which the proxy server is listening for connections.
## If no outproxy is desired, this setting can be left blank or commented out.
#outproxy = http://exit.stormycloud.i2p

## Whether to use the address helper for the HTTP proxy. [true/false]
## Setting this to 'true' enables the address helper for the HTTP proxy, which can help improve the usability of the proxy by providing assistance with address resolution
## and routing for incoming connections.
addresshelper = true

## Whether to send the user agent string for the HTTP proxy. [true/false]
## Setting this to 'true' allows the HTTP proxy to include a user agent string in outgoing HTTP requests, which can provide information about the proxy and its capabilities
## to the destination server. However, it may also reveal information about the proxy that could be used for fingerprinting or other types of attacks.
# senduseragent = false

## LeaseSet type for the HTTP proxy. [1/3/5]
## This setting allows the user to specify the LeaseSet type for the HTTP proxy, which can affect how the proxy handles incoming connections and routes traffic through the
## network.
## The LeaseSet type determines the method used for managing leases and routing for the HTTP proxy, and it can be set to a specific integer value based on the desired
## behavior and performance characteristics of the proxy.
## The default value is typically set to 3, which is a common LeaseSet type that provides a good balance of performance and functionality for the HTTP proxy.
## However, it can be customized to suit the user's preferences or system configuration.
# i2cp.leaseSetType = 3

## Optional encryption type for the HTTP proxy. [integer list]
## This setting allows the user to specify the encryption type for the HTTP proxy, which can be used to provide additional security for incoming connections and traffic
## routed through the proxy.
## The encryption type should be set to a valid integer value that corresponds to the desired encryption algorithm, and it should be chosen based on the user's security
## requirements and preferences.
# i2cp.leaseSetEncType = 

## HTTP Proxy bandwidth usage profile. [integer]
## This setting allows the user to specify a bandwidth usage profile for the HTTP proxy, which can help optimize the performance and resource usage of the proxy based on
## the expected traffic patterns and bandwidth requirements.
## -----------------------------------------------------------------
## Values |   Description
## 1      |   Bulk (high)
## 2      |   Interactive (low)
## -----------------------------------------------------------------
# i2p.streaming.profile = 1

## HTTP Proxy maximum window size for streaming connections. [integer]
## This setting allows the user to specify the maximum window size for the HTTP proxy, which can affect the performance and efficiency of the proxy when handling incoming
## connections and routing traffic through the network.
## The maximum window size determines the amount of data that can be sent in a single transmission before waiting for an acknowledgment from the receiving end. A larger
## window size can improve performance by allowing more data to be sent at once, but it may also increase the risk of congestion and packet loss if the network conditions
## are not optimal.
# i2p.streaming.maxWindowSize = 512

## HTTP Proxy minimum latency for tunnels. [integer]
## This setting allows the user to specify the minimum latency for tunnels used by the HTTP proxy.
# latency.min = 0

## HTTP Proxy maximum latency for tunnels. [integer]
## This setting allows the user to specify the maximum latency for tunnels used by the HTTP proxy.
# latency.max = 0

## Optional private key for the HTTP proxy's LeaseSet. [string]
## Key in base64 format.  PSK or private DH.
## This setting allows the user to specify a private key for the HTTP proxy's LeaseSet, which can be used to provide additional security and authentication for incoming
## connections and traffic routed through the proxy.
# i2cp.leaseSetPrivKey = 

## Maximum outbound speed for the HTTP proxy stream in bytes per second. [integer]
# i2p.streaming.maxOutboundSpeed = 1730000000

## Maximum inbound speed for the HTTP proxy stream in bytes per second. [integer]
# i2p.streaming.maxInboundSpeed = 1730000000

#####################################################################
#                            SOCKS Proxy                            #
#####################################################################

[socksproxy]
## Whether the SOCKS proxy is enabled. [true/false]
## Setting this to 'true' enables the SOCKS proxy, allowing the router to accept incoming SOCKS connections and forward them to other nodes in the network.
enabled = true

## IP address for the SOCKS proxy. [string]
## This is the IP address that the SOCKS proxy will bind to for incoming connections.
## It is important to choose an IP address that is accessible from the user's network and that does not conflict with other services running on the system.
address = 10.0.0.81

## Port for the SOCKS proxy. [integer]
## This is the port that the SOCKS proxy will listen on for incoming connections.
port = 4447

## Optional keys file for SOCKS proxy local destination. [string]
## This setting allows the user to specify a keys file for the SOCKS proxy's local destination, which can be used to provide additional security and authentication for
## incoming connections and traffic routed through the proxy.
# keys = 

## Optional signature type for new keys if keys file is set. [integer]
## This setting allows the user to specify the signature type for new keys generated for the SOCKS proxy when a keys file is provided.
## The signature type determines the algorithm used for signing and verifying keys, and it can be set to a specific integer value based on the desired security and
## performance characteristics of the proxy.
## The default value is typically set to 7, which corresponds to a commonly used signature algorithm that provides a good balance of security and performance for the 
## SOCKS proxy.
## However, it can be customized to suit the user's preferences or system configuration, and it is important to choose a signature type that is compatible with the keys
## file and meets the security requirements of the proxy.
# signaturetype = 7

## Tunnel configuration for the SOCKS proxy when a keys file is provided.
## These settings allow the user to specify the length, quantity, and variance of tunnels for the SOCKS proxy when a keys file is used.
## The tunnel configuration can affect the performance, anonymity, and security of the proxy, and it is important to choose values that balance these factors based on
## the user's preferences and system configuration.
# inbound.length = 3

## Inbound tunnels quantity if keys is set. [integer]
## This setting allows the user to specify the quantity of inbound tunnels for the SOCKS proxy when a keys file is provided.
## The quantity determines the number of separate inbound tunnels that will be established for incoming connections.
## A higher quantity of inbound tunnels can provide increased redundancy and reliability, as multiple tunnels can be used to handle incoming connections.
## However, it may also result in increased resource usage and reduced performance.
# inbound.quantity = 5

## Inbound tunnels length variance if keys is set. [integer]
## This setting allows the user to specify the variance in length for inbound tunnels for the SOCKS proxy when a keys file is provided.
## The variance determines the range of possible lengths for inbound tunnels, allowing for some variability in the tunnel lengths.
## A higher variance can provide increased anonymity and security, as it makes it more difficult for an observer to determine the exact length of the tunnels. However, it may also result in increased latency and reduced performance.
# inbound.lengthVariance = 0

## Outbound tunnel length if keys is set. [integer]
## This setting allows the user to specify the length of outbound tunnels for the SOCKS proxy when a keys file is provided.
## The length determines the number of hops that outgoing connections will take through the network before reaching their destination.
## A longer tunnel length can provide increased anonymity and security, but it may also result in increased latency and reduced performance.
## Conversely, a shorter tunnel length can improve performance but may reduce anonymity and security.
## The default value is typically set to 3, but it can be customized to suit the user's preferences or system configuration.
## It is important to choose a tunnel length that balances the desired level of anonymity and security with the performance requirements of the router.
# outbound.length = 3

## Outbound tunnels quantity if keys is set. [integer]
## This setting allows the user to specify the quantity of outbound tunnels for the SOCKS proxy when a keys file is provided.
## The quantity determines the number of separate outbound tunnels that will be established for outgoing connections.
## A higher quantity of outbound tunnels can provide increased redundancy and reliability, as multiple tunnels can be used to handle outgoing connections.
## However, it may also result in increased resource usage and reduced performance.
# outbound.quantity = 5

## Outbound tunnels length variance if keys is set. [integer]
## This setting allows the user to specify the variance in length for outbound tunnels for the SOCKS proxy when a keys file is provided.
## The variance determines the range of possible lengths for outbound tunnels, allowing for some variability in the tunnel lengths.
## A higher variance can provide increased anonymity and security, as it makes it more difficult for an observer to determine the exact length of the tunnels.
## However, it may also result in increased latency and reduced performance.
# outbound.lengthVariance = 0

## Enable or disable SOCKS5 outproxy. [true/false]
# outproxy.enabled = false

## Address of outproxy (IP or local). Requests outside I2P will go there. [string]
# outproxy = http://exit.stormycloud.i2p

## Port for outproxy. [integer]
# outproxyport = 80

## Type of LeaseSet to be sent. 1, 3 or 5. (default: 3)
# i2cp.leaseSetType = 3

## Comma separated encryption types to be used in LeaseSet type 3 or 5. [integer list]
# i2cp.leaseSetEncType = 

## SOCKS Proxy bandwidth usage profile. [integer]
## ------------------------------------------------------------------
## Values |   Description
## 1      |   Bulk (high)
## 2      |   Interactive (low)
## ------------------------------------------------------------------
# i2p.streaming.profile = 1

## SOCKS Proxy maximum window size for streaming connections. [integer]
# i2p.streaming.maxWindowSize = 512

## SOCKS Proxy minimum latency for tunnels. [integer]
# latency.min = 0

## SOCKS Proxy maximum latency for tunnels. [integer]
# latency.max = 0

## Optional private key for the SOCKS proxy's LeaseSet. [string]
## Key in base64 format.  PSK or private DH.
# i2cp.leaseSetPrivKey = 

## SOCKS Proxy maximum outbound speed in bytes per second. [integer]
# i2p.streaming.maxOutboundSpeed = 1730000000

## SOCKS Proxy maximum inbound speed in bytes per second. [integer]
# i2p.streaming.maxInboundSpeed = 1730000000

#####################################################################
#                             SAM Bridge                            #
#####################################################################

[sam]
## Whether the SAM (Simple Anonymous Messaging) bridge is enabled. [true/false]
## Setting this to 'true' enables the SAM bridge, allowing the router to accept incoming SAM connections and forward them to other nodes in the network.
enabled = true

## IP address for the SAM bridge. [string]
## This is the IP address that the SAM bridge will bind to for incoming connections.
## It is important to choose an IP address that is accessible from the user's network and that does not conflict with other services running on the system.
address = 10.0.0.81

## Port for the SAM bridge. [integer]
## This is the port that the SAM bridge will listen on for incoming connections.
port = 7656

## Optional keys file for SAM bridge local destination. [string]
## This setting allows the user to specify a keys file for the SAM bridge's local destination, which can be used to provide additional security and authentication
## for incoming connections and traffic routed through the bridge.
portudp = 7655

## How many threads to use for the SAM bridge. [integer]
## False  <-- Every SAM session will be handled in a separate thread.
## True   <-- All SAM sessions will be handled in a single thread.
# singlethread = true

#####################################################################
#                            BOB Protocol                           #
#####################################################################

[bob]
## Whether the BOB (Basic Open Bridge) protocol is enabled. [true/false]
## Setting this to 'true' enables the BOB protocol, allowing the router to accept incoming BOB connections and forward them to other nodes in the network.
# enabled = false

## IP address for the BOB protocol. [string]
## This is the IP address that the BOB protocol will bind to for incoming connections.
## It is important to choose an IP address that is accessible from the user's network and that does not conflict with other services running on the system.
# address = 10.0.0.81

## Port for the BOB protocol. [integer]
## This is the port that the BOB protocol will listen on for incoming connections.
# port = 2827

#####################################################################
#                           I2CP Protocol                           #
#####################################################################

[i2cp]
## Whether the I2CP (I2P Control Protocol) is enabled. [true/false]
## Setting this to 'true' enables the I2CP protocol, allowing the router to accept incoming I2CP connections and forward them to other nodes in the network.
enabled = true

## IP address for the I2CP protocol. [string]
## This is the IP address that the I2CP protocol will bind to for incoming connections.
## It is important to choose an IP address that is accessible from the user's network and that does not conflict with other services running on the system.
address = 10.0.0.81

## Port for the I2CP protocol. [integer]
## This is the port that the I2CP protocol will listen on for incoming connections.
port = 7654

## How many threads to use for the I2CP protocol. [true/false]
## False  <-- Every I2CP session will be handled in a separate thread.
## True   <-- All I2CP sessions will be handled in a single thread.
# singlethread = true

## Client inbound limit in KB/s to return in BandwidthLimitsMessage. [integer]
## Router's bandwidth if set to 0.
# inboundlimit = 0

## Client outbound limit in KB/s to return in BandwidthLimitsMessage. [integer]
## Router's bandwidth if set to 0.
# outboundlimit = 0

#####################################################################
#                             I2PControl                            #
#####################################################################

[i2pcontrol]
## Whether the I2P Control is enabled [true/false]
# enabled = false

## The address to listen on. [string]
## It can be a socket path also.
# address = 10.0.0.81

## Port of the I2P Control Service.  Usually 7650. [integer]
## If 0, i2pcontrol address contains path to a local socket.
# port = 7650

## I2P Control authentication password. [string]
# password = itoopie

## I2P Control HTTPS certificate file name. [string]
# cert = i2pcontrol.crt.pem

## I2P Control HTTPS certificate key file name. [string]
# key = i2pcontrol.key.pem

#####################################################################
#                               UPnP                                #
#####################################################################

[upnp]
## Enable or Disable UPnP.  [true/false]
## This communicates with the router to open ports automatically.
## NOTE: On a low power device like a Raspberry Pi 1B, it is better to do the port forwarding and not have the device poll the router constantly to save CPU cycles.
enabled = true

## Name that i2pd appears in UPnP forwardings list. [string]
name = I2Pd

